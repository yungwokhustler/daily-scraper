name: Daily Web3 Message Scraper & Classifier

on:
  schedule:
    - cron: '30 0 * * *'  # Target 0800 WIB — scheduled 30min early to compensate for GH Actions cron delay
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-classify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper and classifier
        run: python main.py
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_NAME: ${{ secrets.TELEGRAM_SESSION_NAME }}
          NOTIF_BOT_TOKEN: ${{ secrets.NOTIF_BOT_TOKEN }}
          NOTIF_CHAT_ID: ${{ secrets.NOTIF_CHAT_ID }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          ELFA_API_KEY: ${{ secrets.ELFA_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/
          git diff --cached --quiet || git commit -m "Add output $(date -u +%Y-%m-%d)"
          git push
